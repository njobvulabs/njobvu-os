
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Njobvu OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Noto Sans', sans-serif;
        overflow: hidden;
        background-color: #000;
        touch-action: none;
        margin: 0;
        padding: 0;
        overscroll-behavior: none;
      }
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(128, 128, 128, 0.3);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(128, 128, 128, 0.5);
      }
      #root:empty::before {
        content: 'NJOBVU OS';
        display: flex;
        height: 100vh;
        width: 100vw;
        align-items: center;
        justify-content: center;
        color: #333;
        font-weight: 900;
        letter-spacing: 0.5rem;
        font-size: 2rem;
        animation: pulse 2s infinite;
      }
      @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 0.7; } 100% { opacity: 0.3; } }
      .custom-scrollbar { scrollbar-width: thin; scrollbar-color: rgba(128,128,128,0.3) transparent; }
      .bg-checkered { background-image: linear-gradient(45deg, #222 25%, transparent 25%), linear-gradient(-45deg, #222 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #222 75%), linear-gradient(-45deg, transparent 75%, #222 75%); background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px; }
      
      @keyframes music-bar { 0% { height: 10%; } 50% { height: 80%; } 100% { height: 10%; } }
      .animate-music-bar { animation: music-bar 1s ease-in-out infinite; }
      
      #error-display { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #ff5555; padding: 20px; font-family: monospace; z-index: 9999; white-space: pre-wrap; }
    </style>
    <script>
      window.process = { env: { NODE_ENV: 'production' } };
      window.onerror = function(msg, url, line, col, error) {
        const d = document.getElementById('error-display');
        if (d) { d.style.display = 'block'; d.innerText = `System Crash:\n${msg}\n\nLine: ${line}`; }
      };
    </script>
    <script type="importmap">
    {
      "imports": {
        "react/": "https://aistudiocdn.com/react@^19.2.1/",
        "react": "https://aistudiocdn.com/react@^19.2.1",
        "lucide-react": "https://aistudiocdn.com/lucide-react@^0.557.0",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
        "@google/genai": "https://esm.sh/@google/genai@^1.32.0",
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.8"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="error-display"></div>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
